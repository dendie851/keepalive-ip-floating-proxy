global
    log stdout format raw local0

defaults
    log     global
    mode    http
    timeout connect 10s
    timeout client  1m
    timeout server  1m

# Dashboard pemantauan HAProxy
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s

# Konfigurasi Load Balancer untuk Nginx Web Server
frontend http_front
    bind *:8080             # HAProxy listen di port 8080
    default_backend nginx_cluster

backend nginx_cluster
    mode http
    balance roundrobin
    
    # Deteksi kesehatan Web menggunakan HTTP Request
    option httpchk GET /
    
    # Nginx nodes via host.docker.internal (akses ke Windows host dari Docker bridge)
    server nginx_node1 host.docker.internal:8081 check inter 2s rise 2 fall 3
    server nginx_node2 host.docker.internal:8082 check inter 2s rise 2 fall 3
    server nginx_node3 host.docker.internal:8083 check inter 2s rise 2 fall 3

