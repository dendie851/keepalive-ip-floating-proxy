vrrp_script check_haproxy {
    script "killall -0 haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 101
    advert_int 1
    
    unicast_src_ip 10.10.0.10
    unicast_peer {
        10.10.0.20
    }
    
    authentication {
        auth_type PASS
        auth_pass RahasiaC
    }
    
    virtual_ipaddress {
        192.168.50.200/24
    }
    
    track_script {
        check_haproxy
    }
}